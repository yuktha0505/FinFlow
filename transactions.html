<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Transactions</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="container">

  <aside class="sidebar">
    <h2>FinFlow</h2>
    <a href="index.html">Dashboard</a>
    <a href="transactions.html" class="active">Transactions</a>
  </aside>

  <main>
    <h1>Transactions</h1>

    <div class="topbar">
      <input id="search" placeholder="Search category..." />
      <select id="filterType">
        <option value="all">All Types</option>
        <option value="income">Income</option>
        <option value="expense">Expense</option>
      </select>
      <button id="addBtn">+ Add</button>
      <select id="roleSelect">
        <option value="user">👤 Viewer</option>
        <option value="admin">⚡ Admin</option>
      </select>
    </div>

    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Category</th>
          <th>Type</th>
          <th>Amount</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>

  </main>
</div>

<!-- Modal -->
<div id="modal" class="modal-overlay hidden">
  <div class="modal">
    <h3>Add Transaction</h3>

    <div class="modal-field">
      <label>Category</label>
      <input id="category" placeholder="e.g. Food, Rent, Salary" />
    </div>

    <div class="modal-field">
      <label>Amount (₹)</label>
      <input id="amount" type="number" placeholder="0" min="0" />
    </div>

    <div class="modal-field">
      <label>Type</label>
      <select id="type">
        <option value="income">Income</option>
        <option value="expense">Expense</option>
      </select>
    </div>

    <div class="modal-field">
      <label>Date</label>
      <input id="txnDate" type="date" />
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveTransaction()">Save</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
